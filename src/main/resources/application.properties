spring.application.name=meditag
spring.config.import=optional:classpath:application_secret.properties

logging.level.org.springdoc=DEBUG

# H2 DB
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.datasource.url=jdbc:h2:tcp://localhost/~/meditag
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# sql
#spring.sql.init.mode=always
#spring.jpa.defer-datasource-initialization=true

# Swagger 설정
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.groups-order=DESC
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.display-request-duration=true
springdoc.show-actuator=true
springdoc.packages-to-scan=com.example.meditag

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# JWT
spring.jwt.secret=${SPRING.JWT.SECRET}

#OAuth2 registration (네이버)
spring.security.oauth2.client.registration.naver.client-name=naver
spring.security.oauth2.client.registration.naver.client-id=E5PbPODzYJxj2MSVFrf3
spring.security.oauth2.client.registration.naver.client-secret=aZVPv92svh
spring.security.oauth2.client.registration.naver.redirect-uri=http://localhost:8080/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.scope=name,email

#OAuth2 provider (네이버)
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

#OAuth2 registration (카카오)
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.client-id=d15da0eca293f2ef60acbd0d21973c59
spring.security.oauth2.client.registration.kakao.client-secret=UwwBT5jOPeAHp5MYfVWA32PsNfVABeuN
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:8080/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email

#OAuth2 provider (카카오)
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

#aws S3 설정
spring.cloud.aws.credentials.accessKey=${SPRING.AWS.S3.ACCESSKEY}
spring.cloud.aws.credentials.secretKey=${SPRING.AWS.S3.SECRETKEY}
spring.cloud.aws.s3.bucket=mymeditag
spring.cloud.aws.region.static=ap-northeast-2

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

#OpenAI API Key
openai.api.key=${OPENAI.API.KEY}
openai.model=gpt-3.5-turbo
openai.api.url=https://api.openai.com/v1/chat/completions

# Redis 설정
spring.data.redis.host=localhost
spring.data.redis.port=6379

# MySQL 전문 검색 설정 (유사 질문 찾기 기능)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect